name: Create Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update version in info.plist
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION=${GITHUB_REF#refs/tags/v}
          # Update version in info.plist using sed with more specific XML path
          sed -i "/<key>version<\/key>/{n;s/<string>.*<\/string>/<string>$VERSION<\/string>/}" assets/info.plist
      
      - name: Create Alfred Workflow
        run: |
          # Create workflow package directly from assets with version in filename
          VERSION=${GITHUB_REF#refs/tags/v}
          cd assets && zip -r ../GitHub-Models-v${VERSION}.alfredworkflow *
          
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: GitHub-Models-v*.alfredworkflow
          generate_release_notes: true
          draft: false
          prerelease: false
